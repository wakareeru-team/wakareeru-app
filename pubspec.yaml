name: wakareeru_app
description: "Flutter client for Wakareeru inference."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  adaptive_platform_ui: 0.1.98
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.5.0
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  intl: any
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/rolling_stock_catalog.json
